<!DOCTYPE html>
<html lang="en">
<head>
    <title>New Admission | MedCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; background: #f8fafc; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">New Patient Admission</h1>
                <p class="text-slate-400 text-sm mt-1">Create digital health record ID</p>
            </div>
            <a href="/dashboard" class="text-slate-400 hover:text-white text-sm">Cancel</a>
        </div>

        <form action="/patients/new" method="POST" class="p-8 space-y-6">
            
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Full Name</label>
                    <input type="text" name="name" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 focus:ring-2 ring-blue-500 outline-none transition" placeholder="e.g. Sarah Connor" required>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Age</label>
                        <input type="number" name="age" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 focus:ring-2 ring-blue-500 outline-none" placeholder="45" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Sex</label>
                        <select name="sex" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 focus:ring-2 ring-blue-500 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Phone Number</label>
                    <input type="text" name="phone" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 focus:ring-2 ring-blue-500 outline-none" placeholder="+1 (555) 000-0000">
                </div>

                 <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Address</label>
                    <input type="text" name="address" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 focus:ring-2 ring-blue-500 outline-none" placeholder="123 Medical Drive">
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition transform hover:-translate-y-1">
                    Create Patient Record →
                </button>
            </div>
        </form>
    </div>

</body>
</html>
